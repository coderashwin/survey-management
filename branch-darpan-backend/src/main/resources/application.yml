server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/branch_darpan?useSSL=false&serverTimezone=Asia/Kolkata
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:replace-this-secret-with-at-least-thirty-two-characters}
  expiration: 86400000

sso:
  mode: ${SSO_MODE:DIRECT_API}
  login-url: ${SSO_LOGIN_URL:https://sso.example.com/login}
  callback-url: ${SSO_CALLBACK_URL:http://localhost:8080/api/v1/auth/sso/callback}

hrms:
  base-url: ${HRMS_API_URL:https://hrms.example.com/api}
  api-key: ${HRMS_API_KEY:demo-key}

cors:
  allowed-origins:
    - http://localhost:4200

springdoc:
  swagger-ui:
    path: /swagger-ui.html
